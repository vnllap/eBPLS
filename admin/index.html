<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — eBPLS BHD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #1a1a1a;
    }

    .login-card {
      background: #fff;
      border-radius: 14px;
      border: 0.5px solid #e0ddd6;
      padding: 2.25rem 2.25rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .login-header {
      margin-bottom: 2rem;
    }

    .login-icon {
      width: 40px; height: 40px;
      background: #f5f4f0;
      border-radius: 10px;
      border: 0.5px solid #e0ddd6;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }

    .login-title {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .login-subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }

    .field-group label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #888;
    }

    .field-group input {
      height: 37px;
      padding: 0 11px;
      border: 0.5px solid #d4d1c8;
      border-radius: 8px;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field-group input:focus {
      border-color: #a0a0a0;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    .field-group input::placeholder { color: #bbb; font-size: 12px; }

    .btn-login {
      width: 100%;
      height: 38px;
      border: none;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { opacity: 0.82; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      font-size: 12px;
      color: #e53935;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
    }
    .back-link:hover { color: #666; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="7" r="3.5" stroke="#888" stroke-width="1.2"/>
          <path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="login-title">Admin Portal</div>
      <div class="login-subtitle">eBPLS BHD Clearance</div>
    </div>

    <div class="field-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span id="login-text">Sign in</span>
      <span id="login-spinner" class="spinner" hidden></span>
    </button>

    <div class="error-msg" id="error-msg"></div>
    <!-- <a href="../index.html" class="back-link">← Back to application form</a> -->
  </div>

  <script src="../config.js"></script>
  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('admin_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      errEl.textContent = '';

      if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        return;
      }

      if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.includes('YOUR_')) {
        errEl.textContent = 'Apps Script URL not configured. See config.js';
        return;
      }

      const btn     = document.getElementById('login-btn');
      const txtEl   = document.getElementById('login-text');
      const spinner = document.getElementById('login-spinner');
      btn.disabled  = true;
      txtEl.textContent = 'Signing in…';
      spinner.hidden = false;

      try {
        const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'login', username, password }),
        });
        const result = await res.json();

        if (result.success) {
          // Store token as "username|~|token"
          sessionStorage.setItem('admin_token', username + '|~|' + result.token);
          sessionStorage.setItem('admin_username', username);
          sessionStorage.setItem('admin_fullname', result.fullName);
          window.location.href = 'dashboard.html';
        } else {
          errEl.textContent = 'Invalid username or password.';
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Please try again.';
      } finally {
        btn.disabled = false;
        txtEl.textContent = 'Sign in';
        spinner.hidden = true;
      }
    }
  </script>

</body>
</html>
